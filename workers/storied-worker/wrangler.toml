name = "storied-worker"
compatibility_date = "2026-04-16"
main = "src/index.ts"
workers_dev = false

[dev]
port = 5501

[observability]
enabled = true

[vars]
SEND_EMAILS = "yes"
DIGEST_BASE_URL = "https://archive.bermudatrianglesociety.com"

[[d1_databases]]
binding = "DB"
database_name = "storied-db"
database_id = "546b0f58-ca90-415a-9968-f05d52925e1a"

[[queues.consumers]]
queue = "storied-worker-tasks"
max_batch_size = 10
max_batch_timeout = 1

[[send_email]]
name = "EMAIL"
allowed_sender_addresses = ["notify@archive.bermudatrianglesociety.com"]

# Cron triggers — handlers wired in src/dispatch.ts#dispatchScheduled.
[triggers]
crons = ["0 * * * *"]
